<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; img-src 'self' data:; base-uri 'none'; form-action 'none'">
<title>School Task Manager</title>
<style>
:root{font-family:system-ui,sans-serif;color:#172033;background:#f4f7fb}*{box-sizing:border-box}body{margin:0;padding:24px}.app{max-width:920px;margin:auto}.top,.card{background:#fff;border:1px solid #dce4f1;border-radius:18px;padding:20px;box-shadow:0 8px 24px #25385812}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.eyebrow{margin:0;color:#2563eb;font-size:12px;font-weight:800;letter-spacing:.12em}h1{margin:4px 0;font-size:28px}h2{margin:0 0 14px;font-size:18px}.muted{color:#62708a;margin:0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}.stat{font-size:28px;font-weight:800}.card{margin-top:16px}label{display:grid;gap:6px;font-size:13px;font-weight:700}.fields{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}input,select,button{font:inherit}input,select{border:1px solid #bcc9da;border-radius:10px;padding:10px;background:#fff}button{border:0;border-radius:10px;padding:10px 14px;background:#2563eb;color:#fff;cursor:pointer;font-weight:700}.secondary{background:#e8eef9;color:#172033}.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}.filters{display:flex;gap:6px;flex-wrap:wrap}.filters button{padding:7px 10px}.task{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;border-top:1px solid #e5ebf4;padding:13px 2px}.task.done .title{text-decoration:line-through;color:#7b879b}.meta{font-size:13px;color:#62708a;margin-top:4px}.task button{padding:7px 9px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.day{min-height:65px;border:1px solid #e0e7f0;border-radius:9px;padding:6px;font-size:12px}.today{outline:2px solid #2563eb}.dot{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1d4ed8;margin-top:3px}.dark{background:#111827;color:#e5e7eb}.dark .top,.dark .card,.dark input,.dark select{background:#1f2937;color:#e5e7eb;border-color:#3c4a61}.dark .muted,.dark .meta{color:#b8c3d8}.dark .secondary{background:#374151;color:#fff}@media(max-width:700px){body{padding:12px}.top{align-items:flex-start;flex-direction:column}.grid,.fields{grid-template-columns:1fr}.calendar{gap:3px}.day{min-height:54px}}
</style>
</head>
<body>
<main class="app" id="app">
<header class="top"><div><p class="eyebrow">SCHOOL TODO</p><h1>School Task Manager</h1><p class="muted">Tasks are saved by date.</p></div><button id="theme" class="secondary">Dark mode</button></header>
<section class="grid"><div class="card"><p class="muted">Today</p><div class="stat" id="todayCount">0</div></div><div class="card"><p class="muted">Active</p><div class="stat" id="activeCount">0</div></div><div class="card"><p class="muted">Done</p><div class="stat" id="doneCount">0</div></div></section>
<section class="card"><h2 id="formTitle">Add task</h2><form id="form"><div class="fields"><label>Task<input id="title" required placeholder="e.g. Prepare class notice"></label><label>Category<select id="category"><option>Class</option><option>Lesson</option><option>Office</option><option>Other</option></select></label><label>Date<input id="due" type="date"></label><label>Priority<select id="priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></label></div><div class="actions"><button id="submit">Add task</button><button id="cancel" type="button" class="secondary" hidden>Cancel</button></div></form></section>
<section class="card"><div class="toolbar"><h2 id="monthLabel">Calendar</h2><div class="actions"><button type="button" id="prev" class="secondary">Previous</button><button type="button" id="next" class="secondary">Next</button></div></div><div class="calendar" id="calendar"></div></section>
<section class="card"><div class="toolbar"><h2>Tasks</h2><div class="filters" id="filters"><button data-filter="all">All</button><button data-filter="today" class="secondary">Today</button><button data-filter="active" class="secondary">Active</button><button data-filter="done" class="secondary">Done</button></div></div><div id="list"></div><p id="empty" class="muted">No tasks yet.</p></section>
</main>
<script src="firebase-tasks.js"></script>
<script>
(()=>{const $=s=>document.querySelector(s),key='school-tasks-v1',today=()=>new Date().toISOString().slice(0,10);let tasks=JSON.parse(localStorage.getItem(key)||'[]'),editing=null,filter='all',month=new Date(new Date().getFullYear(),new Date().getMonth(),1);const save=()=>{localStorage.setItem(key,JSON.stringify(tasks));globalThis.saveSchoolTasks?.(tasks)};const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));function render(){const shown=tasks.filter(t=>filter==='all'||filter==='today'&&t.due===today()||filter==='active'&&!t.done||filter==='done'&&t.done).sort((a,b)=>Number(a.done)-Number(b.done)||(a.due||'9999').localeCompare(b.due||'9999'));$('#list').innerHTML=shown.map(t=>`<article class="task ${t.done?'done':''}"><input type="checkbox" data-toggle="${t.id}" ${t.done?'checked':''}><div><strong class="title">${esc(t.title)}</strong><div class="meta">${esc(t.category)} 쨌 ${t.due||'No date'} 쨌 ${t.priority}</div></div><div><button class="secondary" data-edit="${t.id}">Edit</button> <button class="secondary" data-delete="${t.id}">Delete</button></div></article>`).join('');$('#empty').hidden=shown.length>0;$('#todayCount').textContent=tasks.filter(t=>!t.done&&t.due===today()).length;$('#activeCount').textContent=tasks.filter(t=>!t.done).length;$('#doneCount').textContent=tasks.filter(t=>t.done).length;calendar()}function calendar(){const y=month.getFullYear(),m=month.getMonth(),days=new Date(y,m+1,0).getDate(),start=new Date(y,m,1).getDay();$('#monthLabel').textContent=`${y} / ${String(m+1).padStart(2,'0')}`;let html=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x=>`<div class="day"><b>${x}</b></div>`).join('');for(let i=0;i<start;i++)html+='<div class="day"></div>';for(let d=1;d<=days;d++){const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,items=tasks.filter(t=>t.due===iso).slice(0,2);html+=`<div class="day ${iso===today()?'today':''}"><b>${d}</b>${items.map(t=>`<span class="dot">${esc(t.title)}</span>`).join('')}</div>`}$('#calendar').innerHTML=html}$('#form').addEventListener('submit',e=>{e.preventDefault();const v={title:$('#title').value.trim(),category:$('#category').value,due:$('#due').value,priority:$('#priority').value};if(!v.title)return;if(editing)tasks=tasks.map(t=>t.id===editing?{...t,...v}:t);else tasks.unshift({id:crypto.randomUUID(),...v,done:false});save();editing=null;e.target.reset();$('#cancel').hidden=true;$('#formTitle').textContent='Add task';render()});$('#list').addEventListener('click',e=>{const id=e.target.dataset.edit||e.target.dataset.delete||e.target.dataset.toggle;if(!id)return;if(e.target.dataset.delete){tasks=tasks.filter(t=>t.id!==id);save();render();return}if(e.target.dataset.edit){const t=tasks.find(x=>x.id===id);editing=id;$('#title').value=t.title;$('#category').value=t.category;$('#due').value=t.due;$('#priority').value=t.priority;$('#cancel').hidden=false;$('#formTitle').textContent='Edit task';$('#title').focus();return}tasks=tasks.map(t=>t.id===id?{...t,done:e.target.checked}:t);save();render()});$('#cancel').onclick=()=>{editing=null;$('#form').reset();$('#cancel').hidden=true;$('#formTitle').textContent='Add task'};$('#filters').onclick=e=>{if(!e.target.dataset.filter)return;filter=e.target.dataset.filter;render()};$('#prev').onclick=()=>{month=new Date(month.getFullYear(),month.getMonth()-1,1);calendar()};$('#next').onclick=()=>{month=new Date(month.getFullYear(),month.getMonth()+1,1);calendar()};$('#theme').onclick=()=>document.body.classList.toggle('dark');render()})();
</script>
</body>
</html>
